title: Northstone Invest
description: >-
  Northstone Invest is a Zurich-based private equity firm backing the
  governance, risk and compliance (GRC) software companies that build the
  controls, risk and compliance infrastructure regulated industries depend on.

# Origin used for canonical URLs, og:url and sitemap entries.
# This is a *project* Pages site served at https://2020-management.github.io/northstone/.
# `baseurl` is left empty here so `jekyll serve` works at http://localhost:4000/
# with no flags. The deploy workflow passes the correct --baseurl (/northstone)
# at build time (see .github/workflows/jekyll.yml), so the published sitemap,
# robots.txt and canonical tags use the /northstone path regardless.
# When moving to a custom domain: set `url` to the new origin and add that
# domain to a CNAME file at the repo root.
url: https://2020-management.github.io
baseurl: ""

author: Northstone Research
lang: en

# No theme — all styles live in assets/css. Prevents the bundled minima
# theme from emitting an unused assets/css/style.css into the build.
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Insights articles live in the _insights collection and are served at
# /insights/<slug>/. News items live in the _news collection; they are not
# rendered as standalone pages (output: false) — each item links either to
# external press coverage (external_url) or to the /news/ index.
collections:
  insights:
    output: true
    permalink: /insights/:name/
  news:
    output: false

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle

# Apply the default layout and a sensible category fallback everywhere so
# individual pages only declare what differs (title, description, etc.).
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: insights
    values:
      layout: article
