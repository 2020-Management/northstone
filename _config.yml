title: Northstone Invest
description: >-
  Northstone Invest ist eine Zürcher Beteiligungsgesellschaft, die in
  Softwareunternehmen mit wiederkehrenden Umsätzen und verteidigbaren
  Positionen investiert. Partner werden über Eigenkapital Miteigentümer der
  Beteiligungen.

# Origin used for canonical URLs, og:url and sitemap entries.
# The site is served from a custom domain (see the CNAME file at the repo root),
# so it lives at the root of that domain with no path prefix.
# `baseurl` is left empty here so `jekyll serve` works at http://localhost:4000/
# with no flags. On a custom domain GitHub Pages reports an empty base_path,
# so the deploy workflow's --baseurl is empty too and the published sitemap,
# robots.txt and canonical tags resolve at the domain root.
url: https://northstone-invest.com
baseurl: ""

author:
  name: Northstone Research
lang: de

# Default social-share image (og:image / twitter:image) used by jekyll-seo-tag
# on every page unless a page overrides it with its own `image:` front matter.
# With an image present, jekyll-seo-tag emits twitter:card "summary_large_image"
# automatically. When a real X/Twitter account exists, add:
#   twitter:
#     username: northstoneinvest   # → twitter:site / twitter:creator handles
image: /assets/img/og-image.png

# Logo used in the seo-tag Organization JSON-LD and search results.
logo: /assets/img/icon-512.png

# No theme — all styles live in assets/css. Prevents the bundled minima
# theme from emitting an unused assets/css/style.css into the build.
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Insights articles live in the _insights collection. German articles are
# served at /insights/<slug>/ and English ones at /en/insights/<slug>/
# (each EN file sets its own permalink). Articles carry a `lang` so the index
# pages can show the right set.
collections:
  insights:
    output: true
    permalink: /insights/:name/

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle

# Apply layout, language and locale by path so individual pages only declare
# what differs (title, description, alternate_url). German is the default and
# lives at the root; English lives under /en/.
defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: de
      locale: de_CH
      image: /assets/img/og-image.png
  - scope:
      path: "en"
    values:
      layout: default
      lang: en
      locale: en_US
  - scope:
      path: ""
      type: insights
    values:
      layout: article
